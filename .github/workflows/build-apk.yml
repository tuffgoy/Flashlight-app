name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Target and Extract ZIP Project
        run: |
          echo "=== 1. VERIFYING ZIP EXISTENCE ==="
          if [ ! -f android-flashlight-app.zip ]; then
            echo "CRITICAL ERROR: android-flashlight-app.zip was not found in the root directory!"
            ls -la
            exit 1
          fi

          # Clean target build directory
          rm -rf android-flashlight-app
          mkdir -p android-flashlight-app

          echo "=== 2. EXTRACTING ARCHIVE ==="
          unzip -o android-flashlight-app.zip -d android-flashlight-app

          echo "=== 3. FIXING DOUBLE-NESTED DIRECTORIES ==="
          # If the zip created a folder inside a folder, move everything up one level
          if [ -d android-flashlight-app/android-flashlight-app ]; then
            echo "Detected double-nested folder layout. Flattening workspace..."
            mv android-flashlight-app/android-flashlight-app/* android-flashlight-app/ 2>/dev/null || true
            mv android-flashlight-app/android-flashlight-app/.* android-flashlight-app/ 2>/dev/null || true
          fi

          # Second failsafe: Find where gradlew actually lives and pull everything there
          REAL_ROOT=$(find . -name "gradlew" -exec dirname {} \; | grep -v "android-flashlight-app$" | head -n 1)
          if [ -n "$REAL_ROOT" ] && [ "$REAL_ROOT" != "." ]; then
            echo "Relocating project roots from misplaced directory: $REAL_ROOT"
            cp -r $REAL_ROOT/* android-flashlight-app/ 2>/dev/null || true
            cp -r $REAL_ROOT/.* android-flashlight-app/ 2>/dev/null || true
          fi

          echo "=== 4. FINAL WORKSPACE VERIFICATION ==="
          ls -la android-flashlight-app

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make Gradle wrapper executable
        run: |
          if [ -f android-flashlight-app/gradlew ]; then
            chmod +x android-flashlight-app/gradlew
          else
            echo "CRITICAL ERROR: gradlew script missing from extracted ZIP files."
            exit 1
          fi

      - name: Cache Gradle Build States
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-flashlight-app/**/*.gradle*', 'android-flashlight-app/gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Build Debug APK
        working-directory: android-flashlight-app
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: FlashlightVoice-debug
          path: android-flashlight-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
