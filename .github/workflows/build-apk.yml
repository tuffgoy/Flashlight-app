name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Auto-Detect and Extract Android Project
        run: |
          # Create the clean target directory
          rm -rf android-flashlight-app
          mkdir -p android-flashlight-app

          # Search for ANY zip file in the workspace
          ZIP_FILE=$(find . -maxdepth 2 -iname "*.zip" | head -n 1)
          # Search for ANY tar.gz file in the workspace
          TAR_FILE=$(find . -maxdepth 2 -iname "*.tar.gz" -o -iname "*.tar" | head -n 1)

          if [ -n "$TAR_FILE" ]; then
            echo "Auto-detected archive: $TAR_FILE"
            tar -xf "$TAR_FILE" -C android-flashlight-app --strip-components=1 2>/dev/null || tar -xf "$TAR_FILE" -C android-flashlight-app
          elif [ -n "$ZIP_FILE" ]; then
            echo "Auto-detected archive: $ZIP_FILE"
            unzip -o "$ZIP_FILE" -d android-flashlight-app
            
            # If zipped folder double-nested itself, flatten it out
            if [ -d android-flashlight-app/android-flashlight-app ]; then
              mv android-flashlight-app/android-flashlight-app/* android-flashlight-app/ 2>/dev/null || true
              mv android-flashlight-app/android-flashlight-app/.* android-flashlight-app/ 2>/dev/null || true
            fi
          else
            echo "=== LOGGING WORKSPACE ROOT FILES TO HELP DEBUG ==="
            ls -R
            echo "================================================="
            echo "CRITICAL ERROR: No zip or tar.gz archive found anywhere in the repository root!"
            exit 1
          fi

          # Emergency fix: if files extracted, but gradlew isn't where we expect it
          if [ ! -f android-flashlight-app/gradlew ]; then
            echo "Locating misplaced gradlew..."
            REAL_DIR=$(find . -name "gradlew" -exec dirname {} \; | grep -v "android-flashlight-app" | head -n 1)
            if [ -n "$REAL_DIR" ]; then
              echo "Relocating project files from $REAL_DIR directly into android-flashlight-app"
              cp -r $REAL_DIR/* android-flashlight-app/ 2>/dev/null || true
              cp -r $REAL_DIR/.* android-flashlight-app/ 2>/dev/null || true
            fi
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make Gradle wrapper executable
        working-directory: android-flashlight-app
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
          else
            echo "CRITICAL ERROR: gradlew file still could not be found anywhere in the extracted directory tree."
            exit 1
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-flashlight-app/**/*.gradle.kts', 'android-flashlight-app/gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: android-flashlight-app
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlashlightVoice-debug
          path: android-flashlight-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
