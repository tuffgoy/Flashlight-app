name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract Android project archive
        run: |
          # Ensure a clean target directory exists
          rm -rf android-flashlight-app
          mkdir -p android-flashlight-app

          if [ -f android-flashlight-app.tar.gz ]; then
            echo "Found tar.gz — extracting..."
            tar -xzf android-flashlight-app.tar.gz -C android-flashlight-app --strip-components=1 || tar -xzf android-flashlight-app.tar.gz -C android-flashlight-app
          elif [ -f android-flashlight-app.zip ]; then
            echo "Found zip — extracting..."
            unzip -o android-flashlight-app.zip -d android-flashlight-app
            # If unzipping created a double nested folder inside, flatten it
            if [ -d android-flashlight-app/android-flashlight-app ]; then
              mv android-flashlight-app/android-flashlight-app/* android-flashlight-app/ 2>/dev/null || true
              mv android-flashlight-app/android-flashlight-app/.* android-flashlight-app/ 2>/dev/null || true
            fi
          else
            echo "CRITICAL: No archive found in the root directory!"
            exit 1
          fi

          # Debug check: verify if gradlew exists in the target directory
          if [ ! -f android-flashlight-app/gradlew ]; then
            echo "Searching for misplaced gradlew..."
            REAL_DIR=$(find . -name "gradlew" -exec dirname {} \; | head -n 1)
            if [ -n "$REAL_DIR" ] && [ "$REAL_DIR" != "./android-flashlight-app" ]; then
              echo "Moving project files from $REAL_DIR to android-flashlight-app"
              cp -r $REAL_DIR/* android-flashlight-app/ 2>/dev/null || true
              cp -r $REAL_DIR/.* android-flashlight-app/ 2>/dev/null || true
            fi
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make Gradle wrapper executable
        working-directory: android-flashlight-app
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-flashlight-app/**/*.gradle.kts', 'android-flashlight-app/gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: android-flashlight-app
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlashlightVoice-debug
          path: android-flashlight-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
