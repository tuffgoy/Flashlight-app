name: Unzip Project Files

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip_job:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract zip file
        run: |
          if [ -f android-flashlight-app.zip ]; then
            echo "Targeting zip archive..."
            unzip -o android-flashlight-app.zip -d ./
            rm android-flashlight-app.zip
          else
            echo "CRITICAL: android-flashlight-app.zip not found in the root directory!"
            ls -la
            exit 1
          fi

      - name: Commit and Push Unzipped Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Forced auto-unzip of project files" || true
          git push
