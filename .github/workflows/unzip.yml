name: Unzip and Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip_and_build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Process ZIP Archive if Present
        run: |
          if [ -f android-flashlight-app.zip ]; then
            echo "Targeting zip archive..."
            unzip -o android-flashlight-app.zip -d ./
            rm android-flashlight-app.zip
            
            # Configure Git inside the runner environment
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            # Commit the naked files back to your repository
            git add .
            git commit -m "Auto-unzipped project architecture" || true
            git push
          else
            echo "No zip archive found; proceeding with existing raw files."
          fi

      - name: Auto-Detect Android Root Layout
        run: |
          # Locate where gradlew actually lives in the file tree
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "CRITICAL ERROR: 'gradlew' wrapper script could not be found anywhere in the repository layout."
            ls -R
            exit 1
          fi
          
          # Get the directory name holding the project layout
          PROJECT_DIR=$(dirname "$GRADLEW_PATH")
          echo "PROJECT_ROOT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Android source tree detected inside: $PROJECT_DIR"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make Gradle wrapper executable
        run: chmod +x ${{ env.PROJECT_ROOT_DIR }}/gradlew

      - name: Cache Gradle Build States
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Build Debug App Package (APK)
        working-directory: ${{ env.PROJECT_ROOT_DIR }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlashlightVoice-debug
          path: |
            ${{ env.PROJECT_ROOT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
            ${{ env.PROJECT_ROOT_DIR }}/build/outputs/apk/debug/*apk
          retention-days: 7
