name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle 8.7 directly
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          echo "GRADLE=/tmp/gradle-dist/gradle-8.7/bin/gradle" >> $GITHUB_ENV

      - name: Generate Gradle wrapper inside project
        working-directory: android-flashlight-app
        run: |
          $GRADLE wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-flashlight-app/**/*.gradle.kts', 'android-flashlight-app/gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: android-flashlight-app
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlashlightVoice-debug
          path: android-flashlight-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
