workflows:
  android-debug-build:
    name: Flashlight App - Debug APK
    max_build_duration: 30
    environment:
      java: 17
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    scripts:
      - name: Set SDK path
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android-flashlight-app/local.properties

      - name: Generate Gradle wrapper
        script: |
          curl -s -L https://services.gradle.org/distributions/gradle-8.7-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-8.7/bin/gradle wrapper \
            --project-dir android-flashlight-app \
            --gradle-version 8.7 \
            --distribution-type bin
          chmod +x android-flashlight-app/gradlew

      - name: Build debug APK
        script: |
          cd android-flashlight-app
          set +e
          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/build_full.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e
          echo ""
          echo "========== KOTLIN / COMPILER ERRORS =========="
          grep -E "^e: |error:|Error:" /tmp/build_full.log | grep -v "^e: file" | head -30 || echo "No error lines matched"
          echo "==============================================="
          cp /tmp/build_full.log build.log
          exit $BUILD_EXIT

    artifacts:
      - android-flashlight-app/app/build/outputs/apk/debug/app-debug.apk
      - android-flashlight-app/build.log

    publishing:
      email:
        recipients:
          - mortar6767@outlook.com
        notify:
          success: true
          failure: true
