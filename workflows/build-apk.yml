name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip Android project
        run: |
          if [ -f android-flashlight-app.zip ]; then
            unzip -o android-flashlight-app.zip
            echo "Extracted from zip"
          else
            echo "No zip found — using files directly from repo"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make Gradle wrapper executable
        working-directory: android-flashlight-app
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-flashlight-app/**/*.gradle.kts', 'android-flashlight-app/gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: android-flashlight-app
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlashlightVoice-debug
          path: android-flashlight-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
